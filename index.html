<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surama Arquitetura e Alumínio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
color:#333;
}

header{
background-image:url('WhatsApp Image 2026-06-08 at 09.30.35.jpeg');
background-size:cover;
background-position:center;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
text-align:center;
}

header::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.55);
}

.hero{
position:relative;
z-index:1;
max-width:900px;
padding:20px;
color:white;
}

.hero h1{
font-size:5rem;
margin-bottom:20px;
}

.subtitulo{
font-size:1.8rem;
margin-bottom:25px;
}

.destaque{
font-size:1.3rem;
margin-bottom:35px;
line-height:1.6;
}

.botao{
display:inline-block;
background:#c9a227;
color:white;
text-decoration:none;
padding:14px 30px;
border-radius:6px;
font-weight:bold;
}

section{
max-width:1100px;
margin:auto;
padding:60px 20px;
}

h2{
margin-bottom:20px;
}

.servicos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

footer{
background:#111;
color:white;
text-align:center;
padding:30px;
}

</style>
</head>

<body>
