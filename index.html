display:grid;
grid-template-columns:1fr 1fr;

.grid img{

height:100%;
display:block;

padding:40px;

}

.contato h2{
margin-bottom:20px;
font-size:2rem;
}

.contato p{
margin:8px 0;
}

.botao{
display:inline-block;
margin-top:20px;
padding:12px 25px;
background:#d1b05f;
color:white;
text-decoration:none;
border-radius:6px;
font-weight:bold;
}

.botao:hover{
opacity:.9;
}

@media(max-width:768px){

.grid{
grid-template-columns:1fr;
}

}

</style>
</head>
