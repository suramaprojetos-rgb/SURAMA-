<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SURAMA Arquitetura e Alumínio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3eee5;
}

.topo{
display:grid;
grid-template-columns:1fr 1fr;
}

.logo{
background:#f3eee5;
display:flex;
justify-content:center;
align-items:center;
padding:50px;
}

.logo img{
max-width:320px;
width:100%;
}

.foto{
background:url('WhatsApp Image 2026-06-08 at 09.30.35.jpeg');
background-size:cover;
background-position:center;
min-height:500px;
}

.quem-somos{
background:#0d2340;
color:white;
padding:50px;
}

.solucoes{
background:#32455f;
color:white;
padding:50px;
}

.servicos{
display:grid;
grid-template-columns:repeat(5,1fr);
background:#0d2340;
}

.card{
padding:25px;
text-align:center;
color:white;
border-right:1px solid #c9a227;
}

.orcamento{
background:#c9a227;
text-align:center;
padding:30px;
}

.rodape{
background:#0d2340;
color:white;
padding:30px;
display:grid;
grid-template-columns:repeat(3,1fr);
text-align:center;
}

.copy{
background:#081527;
color:white;
text-align:center;
padding:15px;
}

@media(max-width:900px){
.topo{
grid-template-columns:1fr;
}
.servicos{
grid-template-columns:1fr;
}
.rodape{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<div class="topo">

<div class="logo">
<img src="logo-surama.png" alt="SURAMA">
</div>

<div class="foto"></div>

<div class="quem-somos">
<h2>Quem Somos</h2>
<p>
A SURAMA é uma empresa formada por três arquitetos que une técnica, experiência em obra e compromisso com a qualidade.
</p>
</div>

<div class="solucoes">
<h2>Nossas Soluções</h2>
<p>
Desenvolvemos projetos arquitetônicos aplicados à fabricação, instalação e manutenção de esquadrias em alumínio.
</p>
</div>

</div>

</body>
</html>
