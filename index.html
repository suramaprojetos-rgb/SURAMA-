<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SURAMA Arquitetura e Alumínio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f3efe7;
color:#333;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
max-width:1200px;
margin:auto;
}

.bloco{
width:100%;
height:100%;
}

.bloco img{
width:100%;
height:100%;
display:block;
object-fit:cover;
}

.texto{
background:#1f314d;
color:white;
padding:50px;
display:flex;
flex-direction:column;
justify-content:center;
}

.texto h2{
font-size:2rem;
margin-bottom:20px;
}

.texto p{
line-height:1.8;
font-size:1rem;
}

.contato{
background:#082447;
color:white;
padding:50px;
display:flex;
flex-direction:column;
justify-content:center;
}

.contato h2{
font-size:2rem;
margin-bottom:20px;
}

.contato p{
margin:8px 0;
}

.botao{
display:inline-block;
margin-top:25px;
padding:14px 28px;
background:#d1b05f;
color:white;
text-decoration:none;
border-radius:5px;
font-weight:bold;
width:max-content;
}

.botao:hover{
opacity:.9;
}

@media(max-width:768px){

.grid{
grid-template-columns:1fr;
}

.texto,
.contato{
padding:30px;
}

}

</style>
</head>

<body>

<div class="grid">

<div class="bloco">
<img src="logo-surama.png" alt="SURAMA">
</div>

<div class="bloco">
<img src="fachada-surama.png" alt="Fachada">
</div>

<div class="bloco">
<img src="logo-quem-somos.png" alt="Quem Somos">
</div>

<div class="bloco">
<img src="porta-surama.png" alt="Porta">
</div>

<div class="bloco">
<img src="logo-nossas-solucoes.png" alt="Nossas Soluções">
</div>

<div class="contato">

<h2>Solicite um orçamento</h2>

<p><strong>WhatsApp:</strong> (11) 98926-5280</p>

<p><strong>Instagram:</strong> @surama_projetos</p>

<p><strong>E-mail:</strong> suramaprojetos@gmail.com</p>

<a class="botao"
href="https://wa.me/5511989265280"
target="_blank">
Falar no WhatsApp
</a>

</div>

</div>

</body>
</html>
